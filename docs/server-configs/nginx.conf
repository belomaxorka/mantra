# Mantra CMS — Nginx server block
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/mantra.conf
#   2. Adjust server_name, root, and fastcgi_pass
#   3. Symlink: ln -s /etc/nginx/sites-available/mantra.conf /etc/nginx/sites-enabled/
#   4. Test: nginx -t && systemctl reload nginx
#
# PHP-FPM must be running. Adjust fastcgi_pass to match your setup:
#   - Socket: unix:/run/php/php-fpm.sock  (Debian/Ubuntu default)
#   - TCP:    127.0.0.1:9000

server {
    listen 80;
    server_name example.com;
    root /var/www/example.com;
    index index.php;

    charset utf-8;
    client_max_body_size 64m;

    # --- Security: blocked directories ---

    # Hidden files and directories (.git, .env, .htaccess, etc.)
    location ~ /\. { return 404; }

    # Data, logs, and internal code
    location ^~ /content/ { return 404; }
    location ^~ /storage/ { return 404; }
    location ^~ /core/    { return 404; }

    # Module internals — allow only assets subdirectories
    location ^~ /modules/ {
        location ~* /assets/ {
            expires 30d;
            access_log off;
        }
        return 404;
    }

    # Theme internals — block templates and config
    location ~ ^/themes/.*\.(php|json)$ { return 404; }

    # --- Security: blocked file types ---

    location ~ \.(json|md|lock|bak|sql|tmp|dist|log)$ { return 404; }

    # --- Static content ---

    # Uploads (no PHP execution)
    location ^~ /uploads/ {
        location ~ \.php$ { return 404; }
        expires 30d;
        access_log off;
    }

    # Theme assets
    location ~* ^/themes/[^/]+/assets/ {
        expires 30d;
        access_log off;
    }

    # Static files
    location ~* \.(css|js|ico|gif|jpg|jpeg|png|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # --- Routing ---

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP: entry points only ---

    location = /index.php {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        # fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location = /install.php {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        # fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Block all other PHP files
    location ~ \.php$ { return 404; }
}
