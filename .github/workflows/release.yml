name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: json, session, openssl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit

  release:
    name: Create GitHub Release
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Pre-release if version contains a hyphen (e.g. 2.0.0-beta.1)
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this release
        id: changelog
        run: |
          # Extract the section for this tag from CHANGELOG.md
          # Matches from "## [vX.Y.Z]" until the next "## [" or end of file
          TAG_PATTERN="## \\[${GITHUB_REF_NAME}\\]"
          changelog=$(awk "
            /^${TAG_PATTERN}/  { found=1; next }
            found && /^## \\[/ { exit }
            found              { print }
          " CHANGELOG.md)

          # Trim leading/trailing blank lines
          changelog=$(echo "$changelog" | sed -e '/./,$!d' -e :a -e '/^$/N;/\n$/ba' -e 's/\n$//')

          # Write to output using heredoc delimiter
          {
            echo "body<<CHANGELOG_EOF"
            echo "$changelog"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          # Create a clean archive without export-ignored files
          git archive --format=zip --prefix="mantra-${{ steps.version.outputs.version }}/" HEAD \
            -o "mantra-${{ steps.version.outputs.version }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mantra CMS ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: mantra-${{ steps.version.outputs.version }}.zip
