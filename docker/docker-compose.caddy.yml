services:
  caddy:
    build:
      context: ..
      dockerfile: docker/caddy/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "443:443"
    volumes:
      - ../modules:/var/www/html/modules:ro
      - ../uploads:/var/www/html/uploads:ro
      - caddy_data:/data
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  php:
    build:
      context: ..
      dockerfile: docker/php-fpm/Dockerfile
    restart: unless-stopped
    volumes:
      - ../content:/var/www/html/content
      - ../modules:/var/www/html/modules
      - ../storage:/var/www/html/storage
      - ../uploads:/var/www/html/uploads
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000, $e, $m, 3) ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
