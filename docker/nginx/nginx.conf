server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    charset utf-8;
    client_max_body_size 64m;

    # Security: block hidden files and directories
    location ~ /\. { return 404; }

    # Security: block sensitive directories
    location ^~ /content/ { return 404; }
    location ^~ /storage/ { return 404; }

    # Security: block core except assets
    location ^~ /core/ {
        location ^~ /core/assets/ {
            expires 30d;
            access_log off;
        }
        return 404;
    }

    # Security: block module language files
    location ~ ^/modules/.*/lang/ { return 404; }

    # Security: block sensitive file extensions
    location ~ \.(json|md|lock|bak|sql|tmp|dist|log)$ { return 404; }

    # Security: block PHP in uploads
    location ^~ /uploads/ {
        location ~ \.php$ { return 404; }
        expires 30d;
        access_log off;
    }

    # Static files
    location ~* \.(css|js|ico|gif|jpg|jpeg|png|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
}
