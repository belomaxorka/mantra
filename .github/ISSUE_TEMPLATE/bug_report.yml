name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "e.g. 8.2.15"
    validations:
      required: true

  - type: input
    id: cms-version
    attributes:
      label: Mantra CMS version
      placeholder: "e.g. 1.1.0"
    validations:
      required: true

  - type: input
    id: server
    attributes:
      label: Web server
      placeholder: "e.g. Apache 2.4, Nginx 1.25, PHP built-in server"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output from `storage/logs/`.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or configuration details.
