services:
  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../modules:/var/www/html/modules:ro
      - ../uploads:/var/www/html/uploads:ro
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  php:
    build:
      context: ..
      dockerfile: docker/php-fpm/Dockerfile
    restart: unless-stopped
    volumes:
      - ../content:/var/www/html/content
      - ../modules:/var/www/html/modules
      - ../storage:/var/www/html/storage
      - ../uploads:/var/www/html/uploads
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000, $e, $m, 3) ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      UPSTREAM: nginx:80
    depends_on:
      nginx:
        condition: service_healthy

volumes:
  caddy_data:
